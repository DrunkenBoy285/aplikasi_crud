<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Inventaris</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            max-width:1100px;
            margin:auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        h3{
            margin-bottom:15px;
        }

        hr{
            margin:30px 0;
        }

        input[type=text]{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        input[type=file]{
            margin-bottom:15px;
        }

        button{
            padding:10px 18px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .btn-add{
            background:#0d6efd;
            color:white;
        }

        .btn-update{
            background:#198754;
            color:white;
        }

        .btn-cancel{
            background:#6c757d;
            color:white;
        }

        .btn-edit{
            background:orange;
            color:white;
        }

        .btn-delete{
            background:red;
            color:white;
        }

        img{
            width:70px;
            height:70px;
            object-fit:cover;
            border-radius:5px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        table th{
            background:#0d6efd;
            color:white;
            padding:12px;
        }

        table td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        .hidden{
            display:none;
        }
    </style>

</head>

<body>

<div class="container">

<h1>Data Inventaris</h1>

<!-- ========================= -->
<!-- FORM TAMBAH BARANG -->
<!-- ========================= -->

<h3>Tambah Barang</h3>

<form
    action="/inventaris/create"
    method="POST"
    enctype="multipart/form-data">

    <input
        type="text"
        name="nama_barang"
        placeholder="Masukkan nama barang"
        required>

    <input
        type="file"
        name="photo"
        accept="image/*">

    <br>

    <button
        type="submit"
        class="btn-add">

        Tambah Barang

    </button>

</form>
<hr>

<!-- ========================= -->
<!-- FORM EDIT BARANG -->
<!-- ========================= -->

<div id="editForm" class="hidden">

    <h3>Edit Barang</h3>

    <form
        id="formEdit"
        method="POST"
        enctype="multipart/form-data">

        <input
            type="text"
            id="editNama"
            name="nama_barang"
            placeholder="Nama Barang"
            required>

        <input
            type="file"
            name="photo"
            accept="image/*">

        <br>

        <button
            type="submit"
            class="btn-update">

            Update Barang

        </button>

        <button
            type="button"
            class="btn-cancel"
            onclick="batalEdit()">

            Batal

        </button>

    </form>

    <hr>

</div>

<!-- ========================= -->
<!-- TABEL INVENTARIS -->
<!-- ========================= -->

<h3>Daftar Barang</h3>

<table>

    <thead>

        <tr>

            <th>ID</th>

            <th>Foto</th>

            <th>Nama Barang</th>

            <th>Aksi</th>

        </tr>

    </thead>

    <tbody>

    {% for barang in barang_list %}

        <tr>

            <td>{{ barang.id_barang }}</td>

            <td>

                {% if barang.photo_barang %}

                    <img
                        src="/static/uploads/{{ barang.photo_barang }}"
                        alt="Foto Barang">

                {% else %}

                    Tidak Ada Foto

                {% endif %}

            </td>

            <td>

                {{ barang.nama_barang }}

            </td>

            <td>

                <button
                    class="btn-edit"
                    onclick="editBarang(
                        '{{ barang.id_barang }}',
                        '{{ barang.nama_barang }}'
                    )">

                    Edit

                </button>

                <form
                    action="/inventaris/delete/{{ barang.id_barang }}"
                    method="POST"
                    style="display:inline;">
                    <button
                        type="submit"
                        class="btn-delete"
                        onclick="return confirm('Yakin ingin menghapus barang ini?')">

                        Hapus

                    </button>

                </form>

            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

</div>

<!-- ========================= -->
<!-- JAVASCRIPT -->
<!-- ========================= -->

<script>

function editBarang(id, nama){

    // Tampilkan form edit
    document.getElementById("editForm").classList.remove("hidden");

    // Isi nama barang
    document.getElementById("editNama").value = nama;

    // Ubah action form
    document.getElementById("formEdit").action =
        "/inventaris/edit/" + id;

    // Scroll ke atas
    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

}

function batalEdit(){

    document.getElementById("editForm").classList.add("hidden");

    document.getElementById("editNama").value = "";

}

</script>

</body>

</html>
